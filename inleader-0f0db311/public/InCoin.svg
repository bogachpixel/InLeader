<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CF995F;stop-opacity:1" />
    </linearGradient>
    <filter id="inner-shadow">
      <feOffset dx="0" dy="1"/>
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#gold)" stroke="#B8860B" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.6"/>
  <text x="32" y="36" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#8B6914">IC</text>
</svg>
